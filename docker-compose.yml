

# version: '3.8'

services:
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: thalia-phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=db
      - PMA_ARBITRARY=1
    networks:
      - thalia-network
  
  # 1. Base de données MySQL
  db:
    image: mysql:8.0
    container_name: thalia-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: thalia_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - thalia-network

  # 2. Conteneur PHP pour Symfony
  thalia-backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: thalia-backend
    dns: 
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./thalia-backend:/var/www/thalia-backend
      - /var/www/thalia-backend/var/cache
      - /var/www/thalia-backend/var/log
    depends_on:
      - db
    networks:
      - thalia-network

  
  mailpit:
    image: axllent/mailpit:latest
    container_name: thalia-mailpit
    ports:
      - "1025:1025" # Port SMTP
      - "8025:8025" # Interface Web (http://localhost:8025)
    networks:
      - thalia-network 

  # 3. Serveur Web Nginx
  webserver:
    image: nginx:alpine
    container_name: thalia-webserver
    ports:
      - "8000:80"
    volumes:
      - ./thalia-backend:/var/www/thalia-backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - thalia-backend
    networks:
      - thalia-network

networks:
  thalia-network:
    driver: bridge

volumes:
  db_data: 