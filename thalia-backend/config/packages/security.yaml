security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # ➔ LE PARE-FEU UNIQUE POUR TOUT TON PROJET (Pages Twig & Endpoints JSON internes)
        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker # 🔒 Ton validateur de compte actif veille au grain ici !
            custom_authenticator: App\Security\AppAuthenticator
            logout:
                path: app_logout
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /

    # Contrôle des accès simplifié
    access_control:
        - { path: ^/$, roles: PUBLIC_ACCESS }             
        - { path: ^/login$, roles: PUBLIC_ACCESS }         
        - { path: ^/register$, roles: PUBLIC_ACCESS }
        - { path: ^/profile, roles: ROLE_USER }            
        - { path: ^/superadmin, roles: ROLE_SUPER_ADMIN }
        
        # 💡 Optionnel : Si tu crées des routes JSON pour ton JavaScript (ex: /internal-api/...)
        # Elles seront automatiquement protégées par la session du user connecté !
        # - { path: ^/internal-api, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10