security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    role_hierarchy:
        ROLE_PROGRAMMATEUR: ROLE_USER
        ROLE_TECHNICIEN:    ROLE_USER
        ROLE_FINANCIER:     ROLE_USER
        ROLE_ADMIN:         [ROLE_PROGRAMMATEUR, ROLE_TECHNICIEN, ROLE_FINANCIER]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        
        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker 
            custom_authenticator: App\Security\AppAuthenticator
            logout:
                path: app_logout
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /

    # Contrôle des accès simplifié
    access_control:
        - { path: ^/$, roles: PUBLIC_ACCESS }             
        - { path: ^/login$, roles: PUBLIC_ACCESS }         
        - { path: ^/register$, roles: PUBLIC_ACCESS }
        - { path: ^/profile, roles: ROLE_USER }   

        #. FILTRAGE GLOBAL PAR URL POUR LES PAGES EXCLUSIVES (Optionnel)
        # Attention : si une page est partagée avec des droits différents (ex: les Shows), 
        # ne mets rien ici, laisse l'accès à ROLE_USER et laisse le ShowVoter faire le travail fin !
        # - { path: ^/financial-dashboard, roles: ROLE_FINANCIER }
        # - { path: ^/technical-planning, roles: ROLE_TECHNICIEN }

        - { path: ^/superadmin, roles: ROLE_SUPER_ADMIN }
        

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10